<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Punta Mangle</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:#F3EFE8;
font-family:Helvetica, Arial;
color:#1f3b2c;
text-align:center;
overflow:hidden;
}

.logo{
width:500px;
max-width:80vw;
animation:float 6s ease-in-out infinite;
}

.location{
margin-top:30px;
letter-spacing:4px;
text-transform:uppercase;
font-size:16px;
opacity:.7;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-10px)}
100%{transform:translateY(0)}
}

</style>

</head>

<body>

<div>

<img class="logo" src="logo.png">

<div class="location">
Burica Peninsula · Costa Rica
</div>

</div>

</body>
</html>
