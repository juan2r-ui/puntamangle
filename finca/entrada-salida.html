<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1E5631">
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/png" href="logo.png">
<title>Entrada / Salida · FINCA BURICA</title>
<style>
  :root{--verde:#1E5631;--verde2:#2E7D32;--verde-claro:#EDF5E9;--verde-borde:#C8E6C9;--txt:#1b2a1f;--gris:#6b7c6f;--bg:#f4f7f3;--naranja:#c8631a}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--txt);padding-bottom:30px}
  header{background:linear-gradient(135deg,var(--verde),var(--verde2));color:#fff;padding:calc(env(safe-area-inset-top) + 12px) 14px 12px;position:sticky;top:0;z-index:10;box-shadow:0 2px 10px rgba(0,0,0,.18)}
  .htop{display:flex;align-items:center;gap:10px}
  .htop img{height:34px;background:#fff;border-radius:8px;padding:3px}
  .htop .h1{font-size:16px;font-weight:700}
  .htop .back{color:#fff;text-decoration:none;font-size:13px;background:rgba(255,255,255,.18);padding:6px 11px;border-radius:8px}
  .htop .back.menu{margin-left:auto}
  .sub{font-size:12px;opacity:.9;margin-top:4px}
  .wrap{max-width:760px;margin:0 auto;padding:14px}
  .card{background:#fff;border:1px solid var(--verde-borde);border-radius:14px;padding:12px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
  .repline{display:flex;justify-content:space-between;align-items:center;font-size:12.5px;color:var(--gris)}
  .repline b{color:var(--txt)}
  .filtros{display:flex;gap:7px;margin-bottom:10px;flex-wrap:wrap}
  .fchip{font-size:12.5px;font-weight:600;padding:6px 12px;border-radius:20px;border:1.5px solid var(--verde-borde);background:#fff;color:var(--gris);cursor:pointer}
  .fchip.on{background:var(--verde);color:#fff;border-color:var(--verde)}
  .emp{background:#fff;border:1px solid var(--verde-borde);border-radius:12px;padding:10px 12px;margin-bottom:9px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
  .emp .top{display:flex;align-items:center;gap:10px}
  .emp .av{width:34px;height:34px;flex:0 0 auto;border-radius:50%;background:var(--verde-claro);color:var(--verde);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px}
  .emp .nm{flex:1;min-width:0}
  .emp .nm .n{font-size:14.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px}
  .b-operador{background:#e7e0ff;color:#6a3fd6}
  .b-capataz{background:#fff0d6;color:#b3791a}
  .times{display:flex;gap:8px;margin-top:9px;align-items:flex-end}
  .times .t{flex:1}
  .times label{display:block;font-size:11px;color:var(--gris);font-weight:600;margin:0 0 3px 2px}
  .times input{width:100%;padding:9px;font-size:15px;border:1.5px solid #cdddcf;border-radius:9px;background:#fff;color:var(--txt)}
  .times input:focus{outline:none;border-color:var(--verde2);box-shadow:0 0 0 3px #2e7d3222}
  .times .hrs{flex:0 0 64px;text-align:center}
  .times .hrs .v{font-size:16px;font-weight:800;color:var(--verde);padding:7px 0}
  .ph{text-align:center;color:var(--gris);padding:34px 10px;font-size:14px}
  .sigwrap{position:relative}
  #sig{width:100%;height:150px;background:#fbfdfb;border:2px dashed #b9d0bd;border-radius:12px;touch-action:none;display:block}
  .sighint{position:absolute;left:0;right:0;top:50%;transform:translateY(-50%);text-align:center;color:#aebfb1;font-size:14px;pointer-events:none}
  .lbl{font-size:12px;color:var(--gris);font-weight:600;margin:0 0 6px 2px}
  .clearb{width:100%;margin-top:8px;padding:11px;font-size:14px;font-weight:700;color:var(--verde);background:#fff;border:2px solid var(--verde2);border-radius:11px;cursor:pointer}
  .totalcard{background:linear-gradient(135deg,var(--verde),var(--verde2));color:#fff;border-radius:16px;padding:16px;text-align:center;margin-bottom:12px}
  .totalcard .l{font-size:13px;opacity:.92;font-weight:700}
  .totalcard .big{font-size:30px;font-weight:800;margin:3px 0}
  .totalcard .s{font-size:12.5px;opacity:.92}
  .savebtn{width:100%;padding:15px;font-size:16px;font-weight:800;color:#fff;background:linear-gradient(135deg,#b35414,#d9691a);border:none;border-radius:12px;cursor:pointer;box-shadow:0 3px 10px rgba(179,84,20,.3)}
  .savebtn:active{filter:brightness(.93)}
  .savebtn:disabled{opacity:.6}
  .gate{max-width:420px;margin:60px auto;text-align:center;padding:0 20px;color:var(--gris)}
</style>
</head>
<body>
<header>
  <div class="htop">
    <img src="logo.png" alt="">
    <div class="h1">⏱️ Entrada / Salida</div>
    <a class="back menu" href="index.html">‹ Menú</a>
    <a class="back" id="logout" style="cursor:pointer">Salir</a>
  </div>
  <div class="sub" id="sub">Cargando…</div>
</header>

<div class="wrap" id="wrap" style="display:none">
  <div class="card">
    <div class="repline"><span>📅 Fecha</span><b id="fechaTxt">—</b></div>
    <div class="repline" style="margin-top:6px"><span>👤 Responsable</span><b id="who">—</b></div>
  </div>

  <div class="filtros" id="filtros"></div>
  <div id="lista"></div>

  <div class="card">
    <div class="lbl">🖊️ Firma del responsable</div>
    <div class="sigwrap"><canvas id="sig"></canvas><div class="sighint" id="sighint">✍️ Firmá aquí con el dedo</div></div>
    <button class="clearb" id="sigclear">Borrar firma</button>
  </div>

  <div class="totalcard">
    <div class="l">TOTAL DEL DÍA</div>
    <div class="big"><span id="tHoras">0,0</span> horas</div>
    <div class="s"><span id="tPres">0</span> presentes de <span id="tTot">0</span></div>
  </div>

  <button class="savebtn" id="save">💾 Guardar y generar PDF</button>
</div>

<div class="gate" id="gate" style="display:none"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="firebase-init.js"></script>
<script>window.__sm=window.module;window.__se=window.exports;window.__sd=window.define;try{window.module=void 0;window.exports=void 0;window.define=void 0}catch(e){}</script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script>try{window.module=window.__sm;window.exports=window.__se;window.define=window.__sd}catch(e){}</script>
<script>
const MESES=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
const DIAS=['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
function fechaHoy(){ const d=new Date(); return {larga:`${DIAS[d.getDay()]} ${d.getDate()} de ${MESES[d.getMonth()]} de ${d.getFullYear()}`, corta:`${String(d.getDate()).padStart(2,'0')}-${String(d.getMonth()+1).padStart(2,'0')}-${d.getFullYear()}`}; }
const fH = n => n.toLocaleString('es-ES',{minimumFractionDigits:1,maximumFractionDigits:1});

const CLAS={OPERADOR:['Operador','b-operador'],CAPATAZ_CHEQUEADOR:['Capataz','b-capataz']};
let gente=[];          // {id, Nombre, Clasif}
let reg={};            // id -> {entrada, salida}
let filtro='TODOS';

document.getElementById('logout').onclick=cerrarSesion;

/* Acceso: admin o supervisor de operadores */
requireAuth(function(u){
  if(u.rol!=='admin' && u.rol!=='supervisor_operadores'){
    document.getElementById('sub').textContent='Sin acceso a este módulo';
    document.getElementById('gate').style.display='';
    document.getElementById('gate').innerHTML='Este módulo es para el <b>Supervisor de Operadores</b>.<br>Tu rol ('+(u.rol||'—')+') no tiene acceso.<br><br><a href="index.html">‹ Volver al menú</a>';
    return;
  }
  document.getElementById('fechaTxt').textContent=fechaHoy().larga;
  document.getElementById('who').textContent=u.nombre||u.email;
  document.getElementById('sub').textContent='Registro diario de horas';
  cargarGente();
});

function ini(n){ return (n.trim()[0]||'?').toUpperCase(); }

function cargarGente(){
  fbDB.collection('empleados').get().then(function(snap){
    gente = snap.docs.map(d=>{ const o=d.data(); o.id=d.id; return o; })
      .filter(e => e.Estado!=='INACTIVO' && (e.Clasif==='OPERADOR' || e.Clasif==='CAPATAZ_CHEQUEADOR'))
      .sort((a,b)=> a.Nombre.localeCompare(b.Nombre));
    document.getElementById('wrap').style.display='';
    document.getElementById('tTot').textContent=gente.length;
    renderFiltros(); renderLista(); setupSig();
  }).catch(function(e){
    document.getElementById('sub').textContent='Error al leer la central';
    document.getElementById('gate').style.display=''; document.getElementById('gate').textContent='No se pudo leer el catálogo: '+e.message;
  });
}

const FILTROS=[['TODOS','Todos'],['OPERADOR','Operadores'],['CAPATAZ_CHEQUEADOR','Capataces'],['PRES','Con horas']];
function renderFiltros(){
  const c=document.getElementById('filtros'); c.innerHTML='';
  FILTROS.forEach(([k,l])=>{ const b=document.createElement('button'); b.className='fchip'+(filtro===k?' on':''); b.textContent=l; b.onclick=()=>{filtro=k;renderFiltros();renderLista();}; c.appendChild(b); });
}
function pasa(e){
  if(filtro==='TODOS') return true;
  if(filtro==='PRES') return !!(reg[e.id] && reg[e.id].entrada);
  return e.Clasif===filtro;
}
function renderLista(){
  const cont=document.getElementById('lista'); cont.innerHTML='';
  const arr=gente.filter(pasa);
  arr.forEach(e=>{
    const cl=CLAS[e.Clasif]||['—','b-operador']; const r=reg[e.id]||{};
    const card=document.createElement('div'); card.className='emp';
    card.innerHTML=`<div class="top">
        <div class="av">${ini(e.Nombre)}</div>
        <div class="nm"><div class="n">${e.Nombre}</div></div>
        <span class="badge ${cl[1]}">${cl[0]}</span>
      </div>
      <div class="times">
        <div class="t"><label>Entrada</label><input type="time" data-id="${e.id}" data-k="entrada" value="${r.entrada||''}"></div>
        <div class="t"><label>Salida</label><input type="time" data-id="${e.id}" data-k="salida" value="${r.salida||''}"></div>
        <div class="hrs"><label>Horas</label><div class="v" data-h="${e.id}">${calcH(r.entrada,r.salida)?fH(calcH(r.entrada,r.salida)):'—'}</div></div>
      </div>`;
    cont.appendChild(card);
  });
  if(!arr.length) cont.innerHTML='<div class="ph">No hay personas con ese filtro.</div>';
  cont.querySelectorAll('input[type=time]').forEach(inp=>{
    inp.addEventListener('input',function(){
      const id=this.dataset.id, k=this.dataset.k; reg[id]=reg[id]||{}; reg[id][k]=this.value;
      const hv=document.querySelector('[data-h="'+id+'"]'); const h=calcH(reg[id].entrada,reg[id].salida);
      if(hv) hv.textContent = h?fH(h):'—';
      pintarTotal();
    });
  });
}
function calcH(ent,sal){
  if(!ent||!sal) return 0;
  const a=ent.split(':').map(Number), b=sal.split(':').map(Number);
  let m=(b[0]*60+b[1])-(a[0]*60+a[1]); if(m<0) m=0; return m/60;
}
function pintarTotal(){
  let tot=0,pres=0;
  gente.forEach(e=>{ const r=reg[e.id]; if(r&&r.entrada){ pres++; tot+=calcH(r.entrada,r.salida); } });
  document.getElementById('tHoras').textContent=fH(tot);
  document.getElementById('tPres').textContent=pres;
}

/* ===== Firma ===== */
let sigCanvas,sigCtx,sigHas=false,sigDraw=false,sigLast=null;
function setupSig(){
  sigCanvas=document.getElementById('sig'); sigCtx=sigCanvas.getContext('2d');
  const ratio=window.devicePixelRatio||1, r=sigCanvas.getBoundingClientRect();
  sigCanvas.width=r.width*ratio; sigCanvas.height=r.height*ratio; sigCtx.setTransform(1,0,0,1,0,0); sigCtx.scale(ratio,ratio);
  sigCtx.lineWidth=2.6; sigCtx.lineCap='round'; sigCtx.lineJoin='round'; sigCtx.strokeStyle='#16321f';
  const pos=e=>{const b=sigCanvas.getBoundingClientRect(),t=e.touches?e.touches[0]:e;return{x:t.clientX-b.left,y:t.clientY-b.top};};
  const start=e=>{e.preventDefault();sigDraw=true;sigLast=pos(e);document.getElementById('sighint').style.display='none';};
  const move=e=>{if(!sigDraw)return;e.preventDefault();const p=pos(e);sigCtx.beginPath();sigCtx.moveTo(sigLast.x,sigLast.y);sigCtx.lineTo(p.x,p.y);sigCtx.stroke();sigLast=p;sigHas=true;};
  const stop=()=>{sigDraw=false;};
  sigCanvas.addEventListener('mousedown',start);sigCanvas.addEventListener('mousemove',move);window.addEventListener('mouseup',stop);
  sigCanvas.addEventListener('touchstart',start,{passive:false});sigCanvas.addEventListener('touchmove',move,{passive:false});sigCanvas.addEventListener('touchend',stop);
  document.getElementById('sigclear').onclick=()=>{sigCtx.save();sigCtx.setTransform(1,0,0,1,0,0);sigCtx.clearRect(0,0,sigCanvas.width,sigCanvas.height);sigCtx.restore();sigHas=false;document.getElementById('sighint').style.display='block';};
}

/* ===== Guardar + PDF ===== */
document.getElementById('save').addEventListener('click', async function(){
  const f=fechaHoy();
  const registros=gente.filter(e=>reg[e.id]&&reg[e.id].entrada).map(e=>({id:e.id,nombre:e.Nombre,clasif:e.Clasif,entrada:reg[e.id].entrada,salida:reg[e.id].salida||'',horas:Math.round(calcH(reg[e.id].entrada,reg[e.id].salida)*100)/100}));
  if(!registros.length){ alert('Cargá al menos una entrada antes de guardar.'); return; }
  const btn=this; btn.disabled=true; const txt=btn.textContent; btn.textContent='Guardando…';
  const totHoras=registros.reduce((s,r)=>s+r.horas,0);
  try{
    await fbDB.collection('asistencia').add({
      fecha:f.corta, fechaLarga:f.larga,
      responsableEmail:(USUARIO_ACTUAL&&USUARIO_ACTUAL.email)||'', responsableNombre:(USUARIO_ACTUAL&&USUARIO_ACTUAL.nombre)||'',
      registros:registros, totalHoras:Math.round(totHoras*100)/100, presentes:registros.length,
      creado: firebase.firestore.FieldValue.serverTimestamp()
    });
    generarPDF(f, registros, totHoras);
    btn.textContent='✅ Guardado';
    setTimeout(()=>{ btn.disabled=false; btn.textContent=txt; }, 1500);
  }catch(e){
    alert('No se pudo guardar en la central: '+e.message); btn.disabled=false; btn.textContent=txt;
  }
});

function generarPDF(f, registros, totHoras){
  try{
    const { jsPDF }=window.jspdf;
    const doc=new jsPDF({unit:'mm',format:'a4'});
    const M=15, W=210; let y=14;
    try{ doc.addImage(document.querySelector('.htop img'),'PNG',M,y,20,20); }catch(e){}
    doc.setFont('helvetica','bold'); doc.setFontSize(15); doc.setTextColor(30,86,49);
    doc.text('REPORTE DE ENTRADA / SALIDA', M+24, y+9);
    doc.setFont('helvetica','normal'); doc.setFontSize(11); doc.setTextColor(60,60,60);
    doc.text('FINCA BURICA', M+24, y+16);
    y+=26; doc.setDrawColor(30,86,49); doc.setLineWidth(.6); doc.line(M,y,W-M,y); y+=8;
    doc.setFontSize(11); doc.setTextColor(20,20,20);
    const linea=(et,va)=>{ doc.setFont('helvetica','bold'); doc.text(et,M,y); doc.setFont('helvetica','normal'); doc.text(String(va||'—'),M+42,y); y+=7; };
    linea('Fecha:', f.larga);
    linea('Responsable:', (USUARIO_ACTUAL&&USUARIO_ACTUAL.nombre)||'');
    y+=3;
    const cols=[{x:M,w:78,a:'left'},{x:M+78,w:32,a:'left'},{x:M+110,w:28,a:'center'},{x:M+138,w:24,a:'center'},{x:M+162,w:18,a:'right'}];
    const tit=['Nombre','Puesto','Entrada','Salida','Horas']; const tblW=180;
    function head(){ doc.setFillColor(30,86,49); doc.rect(M,y,tblW,9,'F'); doc.setFont('helvetica','bold'); doc.setFontSize(9.5); doc.setTextColor(255,255,255);
      cols.forEach((c,i)=>{ const tx=c.a==='right'?c.x+c.w-2:(c.a==='center'?c.x+c.w/2:c.x+2); doc.text(tit[i],tx,y+6,{align:c.a}); }); y+=9; doc.setTextColor(20,20,20); }
    head();
    registros.forEach((r,i)=>{
      if(y+8>280){ doc.addPage(); y=18; head(); }
      if(i%2===0){ doc.setFillColor(237,245,233); doc.rect(M,y,tblW,8,'F'); }
      doc.setFont('helvetica','normal'); doc.setFontSize(9.5); const vy=y+5.5;
      doc.text(doc.splitTextToSize(r.nombre,cols[0].w-3)[0], cols[0].x+2, vy);
      doc.text(r.clasif==='CAPATAZ_CHEQUEADOR'?'Capataz':'Operador', cols[1].x+2, vy);
      doc.text(r.entrada||'—', cols[2].x+cols[2].w/2, vy, {align:'center'});
      doc.text(r.salida||'—', cols[3].x+cols[3].w/2, vy, {align:'center'});
      doc.text(fH(r.horas), cols[4].x+cols[4].w-2, vy, {align:'right'});
      y+=8;
    });
    doc.setFillColor(200,230,201); doc.rect(M,y,tblW,9,'F'); doc.setFont('helvetica','bold'); doc.setFontSize(10.5); doc.setTextColor(20,40,20);
    doc.text('TOTAL ('+registros.length+' personas)', cols[0].x+2, y+6);
    doc.text(fH(totHoras)+' h', cols[4].x+cols[4].w-2, y+6, {align:'right'}); y+=16;
    if(sigHas){
      if(y+40>285){ doc.addPage(); y=18; }
      doc.setFont('helvetica','bold'); doc.setFontSize(10.5); doc.setTextColor(30,86,49); doc.text('Firma del responsable:', M, y); y+=4;
      doc.addImage(sigCanvas.toDataURL('image/png'),'PNG',M,y,70,28); y+=31;
      doc.setDrawColor(140); doc.setLineWidth(.3); doc.line(M,y,M+72,y); y+=4;
      doc.setFont('helvetica','normal'); doc.setFontSize(9.5); doc.setTextColor(110,110,110); doc.text((USUARIO_ACTUAL&&USUARIO_ACTUAL.nombre)||'', M, y);
    }
    const folio='ES-'+f.corta.replace(/-/g,'')+'-'+String(Date.now()).slice(-4);
    const hora=new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
    doc.setFont('helvetica','italic'); doc.setFontSize(8.5); doc.setTextColor(120,120,120);
    doc.text('Folio '+folio+' · Generado '+f.corta+' '+hora+' · FINCA BURICA', M, 293);
    const blob=doc.output('blob'); const fname=('Entrada_Salida_'+f.corta+'.pdf').replace(/[^\w.\-]+/g,'_');
    const file=new File([blob],fname,{type:'application/pdf'});
    if(navigator.canShare && navigator.canShare({files:[file]})){ navigator.share({files:[file],title:'Entrada/Salida',text:'Reporte de entrada/salida — '+f.larga}).catch(()=>doc.save(fname)); }
    else doc.save(fname);
  }catch(err){ alert('Se guardó en la central, pero el PDF falló: '+(err&&err.message?err.message:err)); }
}
</script>
</body>
</html>
